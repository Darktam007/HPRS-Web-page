<script>
/* ── CANVAS ─────────────────────────────────────────────────── */
const canvas = document.getElementById('heroCanvas');
const ctx    = canvas.getContext('2d');

function resizeCanvas() {
  canvas.width  = canvas.offsetWidth;
  canvas.height = canvas.offsetHeight;
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

class Particle {
  constructor() { this.reset(); }
  reset() {
    this.x  = Math.random() * canvas.width;
    this.y  = Math.random() * canvas.height;
    this.r  = Math.random() * 1.8 + 0.4;
    this.vx = (Math.random() - 0.5) * 0.35;
    this.vy = (Math.random() - 0.5) * 0.35;
    this.o  = Math.random() * 0.5 + 0.1;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) this.reset();
  }
  draw() {
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(212,175,55,${this.o})`;
    ctx.fill();
  }
}

const particles = Array.from({length: 90}, () => new Particle());

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  particles.forEach(p => { p.update(); p.draw(); });
  for (let i = 0; i < particles.length; i++) {
    for (let j = i + 1; j < particles.length; j++) {
      const dx = particles[i].x - particles[j].x;
      const dy = particles[i].y - particles[j].y;
      const d  = Math.sqrt(dx*dx + dy*dy);
      if (d < 110) {
        ctx.beginPath();
        ctx.moveTo(particles[i].x, particles[i].y);
        ctx.lineTo(particles[j].x, particles[j].y);
        ctx.strokeStyle = `rgba(212,175,55,${0.07*(1-d/110)})`;
        ctx.lineWidth = 0.6;
        ctx.stroke();
      }
    }
  }
  requestAnimationFrame(animate);
}
animate();

/* ── COUNTDOWN ──────────────────────────────────────────────── */
const END_DATE = new Date('2026-04-07T00:00:00').getTime();

function updateTimers() {
  const diff = Math.max(0, END_DATE - Date.now());
  const d = Math.floor(diff / 86400000);
  const h = Math.floor((diff % 86400000) / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  const s = Math.floor((diff % 60000) / 1000);
  const f = n => String(n).padStart(2,'0');
  const sets = [
    ['timerDays','timerHours','timerMins','timerSecs'],
    ['timerDays2','timerHours2','timerMins2','timerSecs2'],
    ['timerDays3','timerHours3','timerMins3','timerSecs3'],
  ];
  sets.forEach(([di,hi,mi,si]) => {
    const vals = {[di]:f(d),[hi]:f(h),[mi]:f(m),[si]:f(s)};
    Object.entries(vals).forEach(([id,val]) => {
      const el = document.getElementById(id);
      if (el) el.textContent = val;
    });
  });
}
setInterval(updateTimers, 1000);
updateTimers();

/* ── SPOTS ──────────────────────────────────────────────────── */
let spots = parseInt(localStorage.getItem('hprs_spots2') || '9');
function updateSpots() {
  ['spotsCount','spotsCount2','spotsCount3'].forEach(id => {
    const el = document.getElementById(id);
    if (el) el.textContent = spots;
  });
}
updateSpots();
setInterval(() => {
  if (spots > 1 && Math.random() < 0.12) {
    spots--;
    localStorage.setItem('hprs_spots2', spots);
    updateSpots();
  }
}, 95000);

/* ── NAV ────────────────────────────────────────────────────── */
window.addEventListener('scroll', () => {
  document.getElementById('mainNav').classList.toggle('scrolled', window.scrollY > 60);
});

/* ── REVEAL ─────────────────────────────────────────────────── */
const ro = new IntersectionObserver(entries => {
  entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => ro.observe(el));

/* ── FAQ ────────────────────────────────────────────────────── */
function toggleFaq(el) {
  const item = el.parentElement;
  const answer = item.querySelector('.faq-a');
  const arrow = el.querySelector('.faq-arrow');
  const open = answer.style.display === 'block';
  document.querySelectorAll('.faq-a').forEach(a => a.style.display = 'none');
  document.querySelectorAll('.faq-arrow').forEach(a => a.textContent = '+');
  if (!open) {
    answer.style.display = 'block';
    arrow.textContent = '−';
  }
}
</script>
</body>
</html>
