<html lang="en">

<style>
/* ── DESIGN TOKENS ─────────────────────────────────────────── */
:root {
  /* Blues */
  --blue-950: #020817;
  --blue-900: #0a1628;
  --blue-800: #0f2240;
  --blue-700: #1a3a6b;
  --blue-600: #1d4ed8;
  --blue-500: #2563eb;
  --blue-400: #3b82f6;
  --blue-300: #60a5fa;
  --blue-200: #93c5fd;
  --blue-100: #dbeafe;
  --blue-50:  #eff6ff;

  /* Surfaces */
  --bg:       #020817;
  --bg2:      #060d1f;
  --card:     #0a1628;
  --card2:    #0f1e38;
  --card3:    #132244;

  /* Blue accents */
  --accent:         #2563eb;
  --accent-hover:   #1d4ed8;
  --accent-active:  #1e40af;
  --accent-light:   #3b82f6;
  --accent-dim:     rgba(37,99,235,0.12);
  --accent-border:  rgba(59,130,246,0.25);
  --accent-glow:    rgba(37,99,235,0.35);

  /* Text */
  --white:     #ffffff;
  --text:      #94a3b8;
  --text-dim:  #475569;
  --text-mute: #334155;

  /* Danger */
  --red:       #ef4444;
  --red-dim:   rgba(239,68,68,0.12);
  --red-border:rgba(239,68,68,0.3);

  /* Radius */
  --r-sm:   6px;
  --r-md:   10px;
  --r-lg:   14px;
  --r-xl:   18px;
  --r-full: 9999px;

  /* Typography */
  --font-head: 'Playfair Display', Georgia, serif;
  --font-body: 'DM Sans', sans-serif;

  /* Shadows */
  --shadow-sm:  0 2px 8px rgba(2,8,23,0.4);
  --shadow-md:  0 8px 24px rgba(2,8,23,0.5);
  --shadow-lg:  0 16px 48px rgba(2,8,23,0.6);
  --shadow-blue:0 8px 32px rgba(37,99,235,0.2);
}

/* ── RESET ──────────────────────────────────────────────────── */
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 16px;
  line-height: 1.7;
  overflow-x: hidden;
}

/* ── SCROLLBAR ───────────────────────────────────────────────── */
::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--accent); border-radius: var(--r-full); }

/* ── NAVIGATION ──────────────────────────────────────────────── */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
  padding: 22px 48px;
  display: flex; align-items: center; justify-content: space-between;
  transition: all 0.4s ease;
}
nav.scrolled {
  background: rgba(2,8,23,0.92);
  backdrop-filter: blur(24px);
  padding: 14px 48px;
  border-bottom: 1px solid var(--accent-border);
  box-shadow: var(--shadow-md);
}
.nav-logo {
  font-family: var(--font-head);
  font-size: 1.5rem; font-weight: 700;
  color: var(--blue-300);
  letter-spacing: 0.08em;
}
.nav-cta {
  background: var(--accent);
  color: #fff;
  font-family: var(--font-body); font-weight: 600; font-size: 0.8rem;
  padding: 10px 24px;
  border-radius: var(--r-md);
  border: none; cursor: pointer;
  letter-spacing: 0.06em; text-transform: uppercase; text-decoration: none;
  transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
  box-shadow: var(--shadow-blue);
}
.nav-cta:hover  { background: var(--accent-hover); box-shadow: 0 8px 24px rgba(37,99,235,0.35); transform: translateY(-1px); }
.nav-cta:active { background: var(--accent-active); transform: translateY(0); }

/* ── BUTTONS ─────────────────────────────────────────────────── */
.btn-primary {
  display: inline-block;
  background: var(--accent);
  color: #fff;
  font-family: var(--font-body); font-weight: 700; font-size: 0.97rem;
  padding: 16px 40px;
  border-radius: var(--r-md);
  border: none; cursor: pointer; text-decoration: none;
  letter-spacing: 0.04em;
  transition: background 0.25s, box-shadow 0.25s, transform 0.15s;
  box-shadow: var(--shadow-blue);
  position: relative; overflow: hidden;
}
.btn-primary::after {
  content: '';
  position: absolute; inset: 0;
  background: rgba(255,255,255,0.08);
  opacity: 0; transition: opacity 0.2s;
  border-radius: var(--r-md);
}
.btn-primary:hover  { background: var(--accent-hover); box-shadow: 0 12px 36px rgba(37,99,235,0.35); transform: translateY(-2px); }
.btn-primary:hover::after { opacity: 1; }
.btn-primary:active { background: var(--accent-active); transform: translateY(0); box-shadow: var(--shadow-blue); }
.btn-primary span { position: relative; z-index: 1; }

.btn-secondary {
  display: inline-block;
  background: transparent;
  color: var(--blue-300);
  font-family: var(--font-body); font-weight: 600; font-size: 0.9rem;
  padding: 15px 38px;
  border-radius: var(--r-md);
  border: 1.5px solid var(--accent-border);
  cursor: pointer; text-decoration: none;
  letter-spacing: 0.04em;
  transition: background 0.25s, border-color 0.25s, transform 0.15s;
}
.btn-secondary:hover  { background: var(--accent-dim); border-color: var(--blue-400); transform: translateY(-1px); }
.btn-secondary:active { transform: translateY(0); }

/* ── HERO ────────────────────────────────────────────────────── */
#hero {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; padding: 130px 20px 100px;
  position: relative; overflow: hidden;
}
canvas#heroCanvas { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.55; }
.hero-content { position: relative; z-index: 2; max-width: 920px; }

.hero-label {
  display: inline-block;
  font-size: 0.7rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--blue-300);
  border: 1px solid var(--accent-border);
  background: var(--accent-dim);
  padding: 7px 20px;
  border-radius: var(--r-full);
  margin-bottom: 36px;
}
.hero-headline {
  font-family: var(--font-head);
  font-size: clamp(2rem, 5vw, 4.2rem);
  font-weight: 900; color: var(--white);
  line-height: 1.13; margin-bottom: 24px;
}
.hero-headline em { font-style: italic; color: var(--blue-300); }
.hero-sub {
  font-size: 1.06rem; color: var(--text);
  max-width: 680px; margin: 0 auto 44px; line-height: 1.85;
}

/* Timer */
.hero-timer {
  display: flex; gap: 12px; justify-content: center;
  margin-bottom: 32px; flex-wrap: wrap; align-items: center;
}
.timer-block {
  background: var(--card2);
  border: 1px solid var(--accent-border);
  border-radius: var(--r-lg);
  padding: 14px 20px; text-align: center; min-width: 72px;
}
.timer-num {
  font-family: var(--font-head); font-size: 2.2rem; font-weight: 700;
  color: var(--blue-300); line-height: 1; display: block;
}
.timer-label { font-size: 0.6rem; letter-spacing: 0.14em; text-transform: uppercase; color: var(--text-dim); }
.timer-sep { font-family: var(--font-head); font-size: 1.8rem; color: var(--accent-border); align-self: center; }

/* Spots badge */
.spots-badge {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--red-dim);
  border: 1px solid var(--red-border);
  color: var(--red);
  font-size: 0.82rem; font-weight: 600;
  padding: 9px 22px; border-radius: var(--r-full);
  letter-spacing: 0.04em; margin-bottom: 32px;
}
.spot-dot {
  width: 8px; height: 8px;
  background: var(--red); border-radius: 50%;
  animation: pulse 1.5s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{opacity:1;transform:scale(1);}50%{opacity:0.5;transform:scale(1.4);} }

.hero-price-note { margin-top: 18px; font-size: 0.78rem; color: var(--text-dim); }

/* ── DIVIDER ──────────────────────────────────────────────────── */
.divider { width: 48px; height: 3px; background: var(--accent); border-radius: var(--r-full); margin: 0 auto; }

/* ── SECTION BASE ─────────────────────────────────────────────── */
section { padding: 100px 20px; }
.container { max-width: 1100px; margin: 0 auto; }
.section-label {
  font-size: 0.68rem; font-weight: 700; letter-spacing: 0.24em; text-transform: uppercase;
  color: var(--blue-400); margin-bottom: 14px;
}
.section-headline {
  font-family: var(--font-head);
  font-size: clamp(1.8rem, 3.5vw, 3rem);
  font-weight: 700; color: var(--white); line-height: 1.2; margin-bottom: 20px;
}
.section-headline em { font-style: italic; color: var(--blue-300); }
.section-sub { font-size: 1rem; color: var(--text); max-width: 640px; line-height: 1.85; }

/* ── PROOF BAR ────────────────────────────────────────────────── */
.proof-bar {
  background: var(--card);
  border-top: 1px solid var(--accent-border);
  border-bottom: 1px solid var(--accent-border);
  padding: 14px 0; overflow: hidden;
}
.proof-track {
  display: flex; gap: 40px; align-items: center;
  animation: marquee 22s linear infinite; width: max-content;
}
.proof-item { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
.proof-item span { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--blue-300); }
.proof-dot { width: 4px; height: 4px; background: var(--accent-border); border-radius: 50%; }
@keyframes marquee { from{transform:translateX(0);}to{transform:translateX(-50%);} }

/* ── FOUNDER ──────────────────────────────────────────────────── */
#founder {
  background: var(--bg2);
  border-top: 1px solid var(--accent-border);
  border-bottom: 1px solid var(--accent-border);
}
.founder-img-wrap { text-align: center; margin-bottom: 52px; }
.founder-img-wrap img {
  width: 260px; height: 320px; object-fit: cover; display: block; margin: 0 auto;
  border-radius: var(--r-xl);
  border: 2px solid var(--accent-border);
  box-shadow: 0 0 40px rgba(37,99,235,0.15);
}
.founder-placeholder {
  width: 260px; height: 320px;
  background: var(--card2);
  border: 2px dashed var(--accent-border);
  border-radius: var(--r-xl);
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  margin: 0 auto;
}
.founder-placeholder span { font-size: 2.5rem; }
.founder-placeholder p { font-size: 0.75rem; color: var(--text-dim); text-align: center; padding: 0 20px; }
.founder-img-caption { font-size: 0.7rem; font-style: italic; color: var(--blue-400); text-align: center; margin-top: 14px; }

.founder-text { max-width: 760px; margin: 0 auto; }
.founder-text p { margin-bottom: 20px; font-size: 1rem; line-height: 1.95; color: var(--text); }
.founder-text .highlight { color: var(--white); font-weight: 600; }
.founder-text .gold-line { color: var(--blue-300); font-weight: 600; font-style: italic; }

.founder-sig { margin-top: 44px; padding-top: 32px; border-top: 1px solid var(--accent-border); }
.founder-sig .name { font-family: var(--font-head); font-size: 1.3rem; color: var(--white); font-style: italic; }
.founder-sig .title { font-size: 0.78rem; color: var(--blue-400); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 6px; }
.founder-cta { margin-top: 40px; text-align: center; }

/* ── RHETORICAL ───────────────────────────────────────────────── */
#rhetorical { background: var(--bg); text-align: center; }
.questions-wrap { max-width: 760px; margin: 0 auto; }
.question-item {
  padding: 28px 32px; margin-bottom: 10px;
  background: var(--card);
  border: 1px solid var(--accent-border);
  border-radius: var(--r-lg);
  transition: border-color 0.3s, background 0.3s;
}
.question-item:hover { border-color: var(--blue-400); background: var(--card2); }
.question-item p {
  font-family: var(--font-head); font-size: clamp(1.1rem, 2vw, 1.5rem);
  color: var(--white); line-height: 1.45; font-style: italic;
}
.rhetorical-close { margin-top: 44px; font-size: 1rem; font-style: italic; color: var(--blue-300); }

/* ── PROBLEM ──────────────────────────────────────────────────── */
#problem { background: var(--bg2); }
.story-wrap { max-width: 780px; margin: 0 auto; }
.story-wrap p { margin-bottom: 22px; font-size: 1.02rem; line-height: 1.95; color: var(--text); }
.story-wrap .story-highlight { color: var(--white); font-weight: 600; }
.story-wrap .story-gold { color: var(--blue-300); font-weight: 700; font-size: 1.12rem; }
.story-wrap .story-break { text-align: center; color: var(--blue-400); font-family: var(--font-head); font-size: 1.4rem; margin: 36px 0; font-style: italic; }

.img-placeholder {
  width: 100%; max-width: 540px; height: 300px;
  background: var(--card);
  border: 2px dashed var(--accent-border);
  border-radius: var(--r-xl);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  margin: 44px auto; gap: 12px;
}
.img-placeholder img { display: none; }
.img-placeholder > span { font-size: 2rem; }
.img-placeholder > p { font-size: 0.75rem; color: var(--text-dim); font-style: italic; text-align: center; }

/* ── SOLUTION ─────────────────────────────────────────────────── */
#solution { background: var(--bg); text-align: center; }
.solution-inner { max-width: 760px; margin: 0 auto; }
.solution-inner p { font-size: 1rem; line-height: 1.9; margin-bottom: 20px; }

/* ── PILLARS ──────────────────────────────────────────────────── */
#pillars { background: var(--bg2); }
.pillars-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-top: 60px;
}
.pillar-card {
  background: var(--card);
  border: 1px solid var(--accent-border);
  border-radius: var(--r-xl);
  padding: 36px 30px;
  transition: border-color 0.3s, background 0.3s, transform 0.3s, box-shadow 0.3s;
}
.pillar-card:hover {
  background: var(--card2); border-color: var(--blue-400);
  transform: translateY(-4px); box-shadow: var(--shadow-blue);
}
.pillar-icon { font-size: 2rem; margin-bottom: 18px; display: block; }
.pillar-title { font-family: var(--font-head); font-size: 1.2rem; color: var(--white); margin-bottom: 12px; }
.pillar-text { font-size: 0.92rem; line-height: 1.8; color: var(--text); }
.pillar-badge {
  display: inline-block; font-size: 0.63rem; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--blue-200); background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  padding: 5px 14px; border-radius: var(--r-full); margin-top: 18px;
}

/* ── BUSINESS SESSIONS ────────────────────────────────────────── */
#sessions { background: var(--bg); }
.tracks-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px; margin-top: 60px;
}
.track-card {
  background: var(--card);
  border: 1px solid var(--accent-border);
  border-radius: var(--r-xl);
  padding: 34px 28px;
  transition: border-color 0.3s, background 0.3s, transform 0.3s, box-shadow 0.3s;
}
.track-card:hover {
  background: var(--card2); border-color: var(--blue-400);
  transform: translateY(-4px); box-shadow: var(--shadow-blue);
}
.track-icon { font-size: 1.8rem; margin-bottom: 16px; }
.track-title { font-family: var(--font-head); font-size: 1.1rem; color: var(--white); margin-bottom: 6px; }
.track-subtitle {
  font-size: 0.7rem; color: var(--blue-400); letter-spacing: 0.12em;
  text-transform: uppercase; margin-bottom: 20px;
}
.track-list { list-style: none; }
.track-list li {
  font-size: 0.88rem; color: var(--text);
  padding: 7px 0 7px 18px; position: relative;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}
.track-list li::before { content: '→'; position: absolute; left: 0; color: var(--blue-400); font-size: 0.75rem; top: 9px; }
.sessions-note {
  margin-top: 40px; padding: 28px 32px;
  border: 1px solid var(--accent-border);
  background: var(--accent-dim); border-radius: var(--r-xl);
  text-align: center;
}
.sessions-note p { font-size: 0.92rem; font-style: italic; color: var(--text); }
.sessions-badge {
  display: inline-block; font-size: 0.65rem; font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--blue-200); background: var(--accent);
  padding: 5px 16px; border-radius: var(--r-full); margin-bottom: 14px;
}

/* ── AUTHORS ──────────────────────────────────────────────────── */
#authors { background: var(--bg2); }
.authors-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 12px; margin-top: 60px;
}
.author-card {
  background: var(--card);
  border: 1px solid var(--accent-border);
  border-radius: var(--r-lg);
  padding: 20px 18px;
  transition: border-color 0.3s, background 0.3s, transform 0.25s;
}
.author-card:hover {
  background: var(--card2); border-color: var(--blue-400);
  transform: translateY(-3px);
}
.author-name { font-weight: 600; font-size: 0.88rem; color: var(--white); margin-bottom: 4px; }
.author-book { font-size: 0.78rem; font-style: italic; color: var(--text); margin-bottom: 10px; }
.author-cat {
  font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--blue-200); background: var(--accent-dim);
  border: 1px solid var(--accent-border);
  padding: 3px 10px; border-radius: var(--r-full); display: inline-block;
}
.authors-close { text-align: center; margin-top: 40px; font-style: italic; color: var(--blue-300); font-size: 0.97rem; }

/* Marquee */
.marquee-wrap {
  overflow: hidden; margin-top: 44px;
  border-top: 1px solid var(--accent-border);
  border-bottom: 1px solid var(--accent-border);
  padding: 14px 0;
}
.marquee-track {
  display: flex; gap: 36px;
  animation: marquee 28s linear infinite; width: max-content;
}
.marquee-track span { font-size: 0.76rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--blue-300); white-space: nowrap; }

/* ── TIMELINE ─────────────────────────────────────────────────── */
#timeline { background: var(--bg); }
.timeline-wrap {
  position: relative; max-width: 820px; margin: 60px auto 0;
}
.timeline-wrap::before {
  content: ''; position: absolute; left: 50%; top: 0; bottom: 0;
  width: 2px;
  background: linear-gradient(to bottom, transparent, var(--accent), var(--blue-700), transparent);
  transform: translateX(-50%);
}
.phase { display: flex; gap: 48px; margin-bottom: 56px; position: relative; }
.phase:nth-child(even) { flex-direction: row-reverse; }
.phase-content {
  flex: 1;
  background: var(--card);
  border: 1px solid var(--accent-border);
  border-radius: var(--r-xl);
  padding: 32px 28px;
  transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
}
.phase-content:hover { background: var(--card2); border-color: var(--blue-400); box-shadow: var(--shadow-blue); }
.phase-dot {
  position: absolute; left: 50%; top: 32px;
  width: 16px; height: 16px;
  background: var(--accent); border-radius: 50%;
  transform: translateX(-50%); z-index: 2;
  box-shadow: 0 0 0 4px var(--accent-dim), 0 0 20px var(--accent-glow);
}
.phase-num { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--blue-400); margin-bottom: 8px; }
.phase-title { font-family: var(--font-head); font-size: 1.3rem; color: var(--white); margin-bottom: 12px; }
.phase-text { font-size: 0.9rem; line-height: 1.8; color: var(--text); }
.phase-spacer { flex: 1; }

/* ── COST SECTION ─────────────────────────────────────────────── */
#cost { background: var(--bg2); text-align: center; }
.cost-questions { max-width: 740px; margin: 60px auto 0; }
.cost-q {
  padding: 28px 32px; margin-bottom: 10px;
  background: var(--card); border: 1px solid var(--accent-border); border-radius: var(--r-lg);
  transition: border-color 0.3s, background 0.3s;
}
.cost-q:hover { background: var(--card2); border-color: var(--blue-400); }
.cost-q p { font-family: var(--font-head); font-size: clamp(1rem, 2vw, 1.3rem); font-style: italic; color: var(--white); line-height: 1.5; }
.cost-close {
  margin-top: 32px; padding: 36px
